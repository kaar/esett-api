services:
  db:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: esett
      POSTGRES_PASSWORD: esett
      POSTGRES_DB: esett
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esett"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      ESETT_DATABASE_URL: "postgresql+asyncpg://esett:esett@db:5432/esett"
    depends_on:
      db:
        condition: service_healthy
